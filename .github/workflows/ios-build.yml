name: Build iOS app

# Bouwt een .ipa bestand voor App Store Connect upload op een gratis GitHub macOS runner.
# Geen lokale Mac nodig.
#
# Vereiste GitHub Secrets (Settings -> Secrets and variables -> Actions):
#   APPLE_ID                 - Apple Developer email (fomosman@gmail.com)
#   APPLE_TEAM_ID            - Team ID (DUALB78L9T)
#   APPLE_APP_SPECIFIC_PASSWORD - Voor altool upload (https://appleid.apple.com -> App-Specific Passwords)
#   APP_STORE_CONNECT_API_KEY_ID    - Voor Fastlane (api key in App Store Connect)
#   APP_STORE_CONNECT_API_ISSUER_ID - Issuer UUID
#   APP_STORE_CONNECT_API_KEY       - .p8 file content (base64 encoded)
#   IOS_DIST_CERT_BASE64     - Distribution certificate (.p12 base64)
#   IOS_DIST_CERT_PASSWORD   - .p12 wachtwoord
#   IOS_PROVISIONING_PROFILE - App Store provisioning profile (.mobileprovision base64)
#   KEYCHAIN_PASSWORD        - Random string voor tijdelijke keychain
#
# Trigger: handmatig via Actions tab, of automatisch op tag v*

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number (verhogen bij elke nieuwe upload)'
        required: true
        default: '5'
  push:
    tags: [ 'ios-v*' ]

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Xcode 15
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Install Capacitor dependencies
        working-directory: capacitor
        run: |
          npm install
          # Geen npx cap init — we gebruiken bestaande capacitor.config.ts

      - name: Add iOS platform
        working-directory: capacitor
        run: |
          npx cap add ios || echo "iOS platform reeds toegevoegd"
          npx cap sync ios

      - name: Copy iOS app icons
        run: |
          mkdir -p capacitor/ios/App/App/Assets.xcassets/AppIcon.appiconset
          cp -f ios-app-icons/AppIcon.appiconset/* capacitor/ios/App/App/Assets.xcassets/AppIcon.appiconset/
          ls -la capacitor/ios/App/App/Assets.xcassets/AppIcon.appiconset/

      - name: Bump build number
        working-directory: capacitor/ios/App
        run: |
          BUILD_NUM="${{ github.event.inputs.build_number || '5' }}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.0" App/Info.plist
          # Voeg verplichte iOS privacy strings toe
          /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string 'FieldOps gebruikt je locatie voor GPS-registratie van meldingen.'" App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'FieldOps gebruikt de camera voor fotos bij meldingen.'" App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'FieldOps slaat fotos op van meldingen.'" App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string 'FieldOps slaat fotos op van meldingen.'" App/Info.plist || true
          echo "=== Info.plist ==="
          cat App/Info.plist | head -50

      - name: Import code signing certificate
        env:
          IOS_DIST_CERT_BASE64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$IOS_DIST_CERT_BASE64" ]; then
            echo "::warning::IOS_DIST_CERT_BASE64 niet gezet — build wordt niet ondertekend, alleen lokale archive"
            exit 0
          fi
          echo "$IOS_DIST_CERT_BASE64" | base64 --decode > /tmp/dist.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import /tmp/dist.p12 -k build.keychain -P "$IOS_DIST_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Install provisioning profile
        env:
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          if [ -z "$IOS_PROVISIONING_PROFILE" ]; then
            echo "::warning::IOS_PROVISIONING_PROFILE niet gezet"
            exit 0
          fi
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/FieldOps_AppStore.mobileprovision

      - name: Build & archive
        working-directory: capacitor/ios/App
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $PWD/build/App.xcarchive \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            archive | tee build.log
          echo "=== Archive klaar ==="
          ls -la build/

      - name: Export .ipa
        working-directory: capacitor/ios/App
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $PWD/build/App.xcarchive \
            -exportPath $PWD/build/ipa \
            -exportOptionsPlist exportOptions.plist \
            -allowProvisioningUpdates
          ls -la build/ipa/

      - name: Upload to App Store Connect
        working-directory: capacitor/ios/App
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ]; then
            echo "::warning::APPLE_APP_SPECIFIC_PASSWORD niet gezet — handmatig uploaden via Transporter"
            exit 0
          fi
          IPA=$(ls build/ipa/*.ipa | head -1)
          xcrun altool --upload-app -f "$IPA" \
            -u "$APPLE_ID" \
            -p "$APPLE_APP_SPECIFIC_PASSWORD" \
            --type ios

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: FieldOps-iOS-build${{ github.event.inputs.build_number || '5' }}
          path: capacitor/ios/App/build/ipa/*.ipa
          retention-days: 30

      - name: Build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: capacitor/ios/App/build.log
          retention-days: 7
